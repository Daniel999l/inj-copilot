<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="hex" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="48" height="48" rx="11" fill="#0A0E1A"/>

  <!-- Hexagon -->
  <path d="M24 5 L40 14.5 L40 33.5 L24 43 L8 33.5 L8 14.5 Z" fill="url(#hex)"/>

  <!-- Upward trend line -->
  <polyline
    points="11,35 16,27 20,30 28,17 35,22"
    stroke="white"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.95"
  />

  <!-- AI peak node -->
  <circle cx="28" cy="17" r="3" fill="white" filter="url(#glow)"/>
</svg>
