<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" fill="none">
  <defs>
    <linearGradient id="hex" x1="0" y1="8" x2="56" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="txt" x1="68" y1="0" x2="130" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="8" width="56" height="56" rx="13" fill="#0A0E1A"/>

  <!-- Hexagon: center (28, 36), circumradius 22 -->
  <path d="M28 14 L47 25 L47 47 L28 58 L9 47 L9 25 Z" fill="url(#hex)"/>

  <!-- Trend line -->
  <polyline
    points="13,48 19,39 24,43 33,28 40,32"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.95"
  />

  <!-- AI peak node -->
  <circle cx="33" cy="28" r="3.5" fill="white" filter="url(#glow)"/>

  <!-- Wordmark: INJ -->
  <text
    x="70"
    y="39"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="30"
    fill="url(#txt)"
  >INJ</text>

  <!-- Wordmark: COPILOT -->
  <text
    x="71"
    y="57"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="11.5"
    fill="#94A3B8"
    letter-spacing="4.5"
  >COPILOT</text>
</svg>
